name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build → Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Create .env from GitHub Secrets ───────────────────────────
      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          EOF

      # ── 5. Build the project ─────────────────────────────────────────
      - name: Build
        run: npx vite build

      # ── 6. Copy SEO + static files into dist ─────────────────────────
      - name: Copy static SEO files
        run: |
          cp static/.htaccess dist/.htaccess
          cp static/sitemap.xml dist/sitemap.xml
          cp static/robots.txt dist/robots.txt
          cp static/manifest.json dist/manifest.json

      # ── 7. Deploy to Hostinger via FTP ───────────────────────────────
      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 148.135.140.223
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
